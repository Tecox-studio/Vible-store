<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vible Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        
        .banner-slide {
            transition: opacity 0.5s ease-in-out;
            opacity: 0;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .banner-slide.active {
            opacity: 1;
            z-index: 1;
        }
        
        /* Hide scrollbar for category list */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Modal Styles */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 50; align-items: center; justify-content: center; }
        .modal.active { display: flex; }

        /* Text truncation */
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- Content will be injected here by JavaScript -->
        
        <!-- Modern Skeleton Loader -->
        <div class="w-full bg-gray-50 min-h-screen animate-pulse">
            <!-- Header Skeleton -->
            <header class="bg-[#0f1111] w-full">
                <div class="container mx-auto px-4 py-3 flex items-center gap-4">
                    <div class="h-8 w-24 bg-gray-700 rounded"></div>
                    <div class="flex-grow h-10 bg-gray-700 rounded hidden md:block"></div>
                    <div class="w-16 h-8 bg-gray-700 rounded ml-auto"></div>
                    <div class="w-10 h-8 bg-gray-700 rounded"></div>
                </div>
                <div class="bg-[#232f3e] py-3 px-4">
                    <div class="container mx-auto flex gap-6 overflow-hidden">
                        <div class="h-4 w-16 bg-gray-600 rounded shrink-0"></div>
                        <div class="h-4 w-20 bg-gray-600 rounded shrink-0"></div>
                        <div class="h-4 w-24 bg-gray-600 rounded shrink-0"></div>
                        <div class="h-4 w-16 bg-gray-600 rounded shrink-0"></div>
                    </div>
                </div>
            </header>
            
            <main class="pb-16">
                <!-- Hero Banner Skeleton -->
                <div class="w-full h-[300px] md:h-[400px] bg-gray-200 mb-8"></div>
                
                <!-- Category Circles Skeleton -->
                <div class="container mx-auto px-4 mb-8 flex gap-4 overflow-hidden">
                    <div class="w-[100px] h-[100px] bg-gray-200 rounded-lg shrink-0"></div>
                    <div class="w-[100px] h-[100px] bg-gray-200 rounded-lg shrink-0"></div>
                    <div class="w-[100px] h-[100px] bg-gray-200 rounded-lg shrink-0"></div>
                    <div class="w-[100px] h-[100px] bg-gray-200 rounded-lg shrink-0"></div>
                    <div class="w-[100px] h-[100px] bg-gray-200 rounded-lg shrink-0 hidden sm:block"></div>
                    <div class="w-[100px] h-[100px] bg-gray-200 rounded-lg shrink-0 hidden md:block"></div>
                </div>

                <!-- Products Grid Skeleton -->
                <div class="container mx-auto px-4">
                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                        <!-- Card 1 -->
                        <div class="bg-white rounded-lg p-4 shadow-sm border border-gray-100">
                            <div class="w-full pt-[100%] bg-gray-100 rounded mb-4"></div>
                            <div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
                            <div class="h-4 bg-gray-200 rounded w-1/2 mb-4"></div>
                            <div class="h-8 bg-gray-200 rounded w-full"></div>
                        </div>
                        <!-- Card 2 -->
                        <div class="bg-white rounded-lg p-4 shadow-sm border border-gray-100 hidden sm:block">
                            <div class="w-full pt-[100%] bg-gray-100 rounded mb-4"></div>
                            <div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
                            <div class="h-4 bg-gray-200 rounded w-1/2 mb-4"></div>
                            <div class="h-8 bg-gray-200 rounded w-full"></div>
                        </div>
                        <!-- Card 3 -->
                        <div class="bg-white rounded-lg p-4 shadow-sm border border-gray-100 hidden md:block">
                            <div class="w-full pt-[100%] bg-gray-100 rounded mb-4"></div>
                            <div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
                            <div class="h-4 bg-gray-200 rounded w-1/2 mb-4"></div>
                            <div class="h-8 bg-gray-200 rounded w-full"></div>
                        </div>
                        <!-- Card 4 -->
                        <div class="bg-white rounded-lg p-4 shadow-sm border border-gray-100 hidden lg:block">
                            <div class="w-full pt-[100%] bg-gray-100 rounded mb-4"></div>
                            <div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
                            <div class="h-4 bg-gray-200 rounded w-1/2 mb-4"></div>
                            <div class="h-8 bg-gray-200 rounded w-full"></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
        
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="modal">
        <div class="bg-white rounded-lg p-8 w-full max-w-md mx-4 shadow-2xl">
            <h2 class="text-2xl font-bold mb-2 text-center text-gray-800">Welcome to Vible Store</h2>
            <p class="text-gray-500 text-center mb-6">Please log in to continue</p>
            <input type="text" id="login-name" placeholder="Enter your full name" class="w-full border border-gray-300 rounded px-4 py-2 mb-4 focus:outline-none focus:border-orange-500">
            <button onclick="handleUserLogin()" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 px-4 rounded transition">
                Start Shopping
            </button>
        </div>
    </div>

    <!-- Admin Password Modal -->
    <div id="admin-auth-modal" class="modal">
        <div class="bg-white rounded-lg p-8 w-full max-w-sm mx-4 shadow-2xl">
            <h2 class="text-xl font-bold mb-4 text-center text-gray-800">Admin Login</h2>
            <input type="password" id="admin-password" placeholder="Enter Password" class="w-full border border-gray-300 rounded px-4 py-2 mb-4 focus:outline-none focus:border-gray-800">
            <button onclick="verifyAdmin()" class="w-full bg-gray-900 hover:bg-black text-white font-bold py-2 px-4 rounded transition">
                Login to Dashboard
            </button>
            <p id="admin-error" class="text-red-500 text-sm mt-2 text-center hidden">Incorrect password!</p>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration (Fallback to user provided if system not present)
        let firebaseConfig;
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
        } else {
            firebaseConfig = {
                apiKey: "AIzaSyArnkuGfSgOG0xVxwxQE9CX2S0-PUdpdOQ",
                authDomain: "vible-store.firebaseapp.com",
                projectId: "vible-store",
                storageBucket: "vible-store.firebasestorage.app",
                messagingSenderId: "566641793645",
                appId: "1:566641793645:web:3ca91fbc851aba5495bd64",
                measurementId: "G-CX3NNTNR6N"
            };
        }
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'vible-store';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // State Management
        let currentUser = null;
        let products = [];
        let banners = [];
        let storeLogo = '';
        let activeCategory = 'All';
        let searchQuery = '';
        let bannerInterval = null;
        
        const categories = ["Electronics", "Fashion", "Home & Kitchen", "Beauty", "Sports", "Books", "Automotive", "Toys & Games"];

        // Initialize App Auth first
        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                checkUserLoginStatus();
                setupDatabaseListeners();
            }
        });

        // Database Listeners
        function setupDatabaseListeners() {
            if (!currentUser) return;

            // Load Products
            const productsRef = collection(db, 'artifacts', appId, 'public', 'data', 'products');
            onSnapshot(productsRef, (snapshot) => {
                products = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderApp();
            }, (error) => { console.error("Error fetching products:", error); });

            // Load Settings (Logo, Banners)
            const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'main');
            onSnapshot(settingsRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    storeLogo = data.logo || '';
                    banners = data.banners || [];
                }
                renderApp();
            }, (error) => { console.error("Error fetching settings:", error); });
        }

        // Check Local User Profile
        function checkUserLoginStatus() {
            const userName = localStorage.getItem('vible_username');
            const hash = window.location.hash;
            
            if (hash === '#vible-admin') {
                document.getElementById('admin-auth-modal').classList.add('active');
            } else if (!userName) {
                document.getElementById('login-modal').classList.add('active');
            } else {
                renderApp();
            }
        }

        // Global functions for UI bindings
        window.handleUserLogin = function() {
            const name = document.getElementById('login-name').value.trim();
            if (name) {
                localStorage.setItem('vible_username', name);
                document.getElementById('login-modal').classList.remove('active');
                renderApp();
            }
        };

        window.verifyAdmin = function() {
            const pass = document.getElementById('admin-password').value;
            if (pass === '2010') {
                sessionStorage.setItem('isAdminAuth', 'true');
                document.getElementById('admin-auth-modal').classList.remove('active');
                renderApp();
            } else {
                document.getElementById('admin-error').classList.remove('hidden');
            }
        };

        window.logoutAdmin = function() {
            sessionStorage.removeItem('isAdminAuth');
            window.location.hash = '';
            renderApp();
        };

        // Routing & Rendering
        function renderApp() {
            const hash = window.location.hash;
            const container = document.getElementById('app-container');
            
            if (hash === '#vible-admin') {
                if (sessionStorage.getItem('isAdminAuth') === 'true') {
                    container.innerHTML = getAdminHTML();
                    setupAdminEvents();
                } else {
                    document.getElementById('admin-auth-modal').classList.add('active');
                }
            } else {
                container.innerHTML = getStoreHTML();
                setupStoreEvents();
            }
            
            lucide.createIcons();
        }
        
        window.addEventListener('hashchange', () => {
            document.getElementById('admin-auth-modal').classList.remove('active');
            checkUserLoginStatus();
            renderApp();
        });

        /* ================= STORE VIEW ================= */
        function getStoreHTML() {
            const userName = localStorage.getItem('vible_username') || 'User';
            
            // Filter products
            let displayProducts = products;
            if (activeCategory !== 'All') {
                displayProducts = displayProducts.filter(p => p.category === activeCategory);
            }
            if (searchQuery) {
                displayProducts = displayProducts.filter(p => p.title.toLowerCase().includes(searchQuery.toLowerCase()));
            }

            const defaultLogo = `<div class="flex items-center text-2xl font-bold text-white"><span class="text-orange-500">V</span>S <span class="ml-1 font-semibold">VIBLE <span class="text-orange-500 text-sm align-top">STORE</span></span></div>`;
            const logoHTML = storeLogo ? `<img src="${storeLogo}" alt="Logo" class="h-10">` : defaultLogo;

            const categoryIcons = {
                "Electronics": "headphones", "Fashion": "shirt", "Home & Kitchen": "coffee", 
                "Beauty": "sparkles", "Sports": "dribbble", "Books": "book-open", 
                "Automotive": "car", "Toys & Games": "gamepad-2"
            };

            return `
                <!-- Header -->
                <header class="bg-[#0f1111] text-white sticky top-0 z-40">
                    <div class="container mx-auto px-4 py-3 flex flex-wrap lg:flex-nowrap items-center gap-4">
                        <a href="#" class="cursor-pointer flex-shrink-0" onclick="window.setCategory('All')">${logoHTML}</a>
                        
                        <!-- Search Bar -->
                        <div class="flex-grow flex items-center bg-white rounded overflow-hidden">
                            <select class="bg-gray-100 text-gray-800 px-3 py-2 border-r outline-none hidden md:block">
                                <option>All Categories</option>
                            </select>
                            <input type="text" id="store-search" placeholder="Search for products..." value="${searchQuery}"
                                   class="w-full px-4 py-2 text-gray-800 outline-none">
                            <button onclick="handleSearch()" class="bg-orange-400 hover:bg-orange-500 px-5 py-2 text-gray-900 transition">
                                <i data-lucide="search" class="w-5 h-5"></i>
                            </button>
                        </div>
                        
                        <!-- Actions -->
                        <div class="flex items-center gap-6 ml-auto flex-shrink-0">
                            <div class="hidden md:flex flex-col cursor-pointer">
                                <span class="text-xs text-gray-300">Hello, ${userName}</span>
                                <span class="text-sm font-bold flex items-center gap-1">Account <i data-lucide="chevron-down" class="w-4 h-4"></i></span>
                            </div>
                            <div class="flex items-center gap-1 cursor-pointer">
                                <i data-lucide="heart" class="w-5 h-5"></i>
                                <span class="hidden md:block font-bold text-sm mt-1">Wishlist</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Sub Nav -->
                    <div class="bg-[#232f3e] py-2 px-4 overflow-x-auto no-scrollbar">
                        <div class="container mx-auto flex items-center gap-6 text-sm font-medium whitespace-nowrap">
                            <button onclick="window.setCategory('All')" class="${activeCategory === 'All' ? 'text-orange-400 border-b-2 border-orange-400' : 'text-gray-300 hover:text-white'} pb-1">Home</button>
                            ${categories.map(cat => `
                                <button onclick="window.setCategory('${cat}')" class="${activeCategory === cat ? 'text-orange-400 border-b-2 border-orange-400' : 'text-gray-300 hover:text-white'} pb-1">${cat}</button>
                            `).join('')}
                        </div>
                    </div>
                </header>

                <!-- Main Content -->
                <main class="pb-16 bg-gray-50 min-h-screen">
                    ${activeCategory === 'All' && !searchQuery ? `
                        <!-- Hero Banner Slider -->
                        <div class="relative w-full h-[300px] md:h-[400px] lg:h-[500px] bg-gray-900 overflow-hidden mb-8" id="banner-container">
                            ${banners.length > 0 ? banners.map((banner, index) => `
                                <div class="banner-slide ${index === 0 ? 'active' : ''}">
                                    <img src="${banner}" class="w-full h-full object-cover opacity-80" alt="Banner">
                                </div>
                            `).join('') : `
                                <div class="absolute inset-0 flex flex-col items-center justify-center bg-gradient-to-r from-gray-800 to-gray-900">
                                    <h1 class="text-4xl md:text-6xl font-bold text-white mb-4">Shop More, <span class="text-orange-400">Earn More.</span></h1>
                                    <p class="text-gray-300 text-lg">Find the best products, top deals and exclusive offers.</p>
                                </div>
                            `}
                        </div>

                        <!-- Category Circles -->
                        <div class="container mx-auto px-4 mb-8">
                            <div class="flex overflow-x-auto no-scrollbar gap-4 pb-4">
                                ${categories.map(cat => `
                                    <div onclick="window.setCategory('${cat}')" class="flex flex-col items-center justify-center min-w-[100px] h-[100px] bg-white rounded-lg shadow-sm cursor-pointer hover:shadow-md transition group border border-gray-100">
                                        <i data-lucide="${categoryIcons[cat] || 'box'}" class="w-8 h-8 text-gray-400 group-hover:text-orange-500 mb-2 transition"></i>
                                        <span class="text-xs font-medium text-gray-700 text-center">${cat}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    ` : `
                        <div class="container mx-auto px-4 pt-6 pb-2">
                            <h2 class="text-2xl font-bold text-gray-800 mb-4">
                                ${searchQuery ? `Search Results for "${searchQuery}"` : `${activeCategory} Products`}
                            </h2>
                        </div>
                    `}

                    <!-- Products Grid -->
                    <div class="container mx-auto px-4">
                        ${displayProducts.length === 0 ? `
                            <div class="flex flex-col items-center justify-center py-20 bg-white rounded-lg border border-gray-200">
                                <i data-lucide="package-search" class="w-16 h-16 text-gray-300 mb-4"></i>
                                <h3 class="text-xl font-semibold text-gray-600">No products found</h3>
                                <p class="text-gray-400 mt-2">Try selecting a different category or clear your search.</p>
                                <button onclick="window.setCategory('All'); document.getElementById('store-search').value='';" class="mt-4 px-6 py-2 bg-orange-500 text-white font-medium rounded hover:bg-orange-600 transition">View All Products</button>
                            </div>
                        ` : `
                            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                                ${displayProducts.map(product => `
                                    <div class="bg-white rounded-lg overflow-hidden shadow-sm hover:shadow-lg transition border border-gray-100 flex flex-col group">
                                        <div class="relative pt-[100%] bg-gray-50 flex items-center justify-center">
                                            ${product.discount ? `<div class="absolute top-2 left-2 bg-red-500 text-white text-xs font-bold px-2 py-1 rounded">-${product.discount}%</div>` : ''}
                                            <img src="${product.image}" alt="${product.title}" class="absolute inset-0 w-full h-full object-contain p-4 group-hover:scale-105 transition duration-300">
                                        </div>
                                        <div class="p-4 flex flex-col flex-grow">
                                            <h3 class="font-medium text-gray-800 mb-2 line-clamp-2" title="${product.title}">${product.title}</h3>
                                            <div class="mt-auto">
                                                <div class="flex items-center gap-2 mb-3">
                                                    <span class="text-xl font-bold text-gray-900">₹${product.price}</span>
                                                    ${product.oldPrice ? `<span class="text-sm text-gray-400 line-through">₹${product.oldPrice}</span>` : ''}
                                                </div>
                                                <a href="${product.link}" target="_blank" rel="noopener noreferrer" class="block w-full text-center bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-medium py-2 rounded transition">
                                                    View Item
                                                </a>
                                            </div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        `}
                    </div>
                </main>
                
                <!-- Footer -->
                <footer class="bg-[#232f3e] text-white py-8 border-t-4 border-[#0f1111]">
                    <div class="container mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-8">
                        <div class="flex items-center gap-4">
                            <i data-lucide="shield-check" class="w-10 h-10 text-orange-400"></i>
                            <div>
                                <h4 class="font-bold">Trusted & Secure</h4>
                                <p class="text-sm text-gray-400">Your safety is our priority. Secure shopping experience.</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <i data-lucide="tag" class="w-10 h-10 text-orange-400"></i>
                            <div>
                                <h4 class="font-bold">Best Prices</h4>
                                <p class="text-sm text-gray-400">We bring you the best deals and huge discounts.</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <i data-lucide="headset" class="w-10 h-10 text-orange-400"></i>
                            <div>
                                <h4 class="font-bold">24/7 Support</h4>
                                <p class="text-sm text-gray-400">Need help? We're here for you anytime.</p>
                            </div>
                        </div>
                    </div>
                </footer>
            `;
        }

        function setupStoreEvents() {
            // Auto slide banners
            if (bannerInterval) clearInterval(bannerInterval);
            
            const slides = document.querySelectorAll('.banner-slide');
            if (slides.length > 1) {
                let currentSlide = 0;
                bannerInterval = setInterval(() => {
                    slides[currentSlide].classList.remove('active');
                    currentSlide = (currentSlide + 1) % slides.length;
                    slides[currentSlide].classList.add('active');
                }, 3000);
            }

            // Search event
            const searchInput = document.getElementById('store-search');
            if (searchInput) {
                searchInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') handleSearch();
                });
            }
        }

        window.setCategory = function(category) {
            activeCategory = category;
            searchQuery = '';
            renderApp();
            window.scrollTo(0,0);
        };

        window.handleSearch = function() {
            const input = document.getElementById('store-search');
            searchQuery = input.value.trim();
            renderApp();
        };

        /* ================= ADMIN VIEW ================= */
        function getAdminHTML() {
            return `
                <div class="min-h-screen bg-gray-100 flex">
                    <!-- Sidebar -->
                    <div class="w-64 bg-gray-900 text-white hidden md:block">
                        <div class="p-6 border-b border-gray-800">
                            <h2 class="text-xl font-bold text-orange-500">Vible Admin</h2>
                        </div>
                        <nav class="p-4 space-y-2">
                            <a href="#vible-admin" class="flex items-center gap-3 bg-gray-800 px-4 py-3 rounded text-orange-400"><i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard</a>
                            <button onclick="window.logoutAdmin()" class="w-full flex items-center gap-3 hover:bg-gray-800 px-4 py-3 rounded text-gray-300 transition"><i data-lucide="log-out" class="w-5 h-5"></i> Logout</button>
                            <a href="#" class="w-full flex items-center gap-3 hover:bg-gray-800 px-4 py-3 rounded text-gray-300 transition mt-8"><i data-lucide="store" class="w-5 h-5"></i> View Store</a>
                        </nav>
                    </div>

                    <!-- Main Content -->
                    <div class="flex-1 overflow-y-auto">
                        <header class="bg-white shadow-sm p-4 flex justify-between items-center md:hidden">
                            <h2 class="text-xl font-bold text-orange-500">Vible Admin</h2>
                            <button onclick="window.logoutAdmin()" class="text-gray-600"><i data-lucide="log-out"></i></button>
                        </header>

                        <div class="p-6 max-w-6xl mx-auto space-y-6">
                            
                            <!-- Banners & Logo Section -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <!-- Logo Setup -->
                                <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
                                    <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2"><i data-lucide="image" class="w-5 h-5 text-blue-500"></i> Store Logo</h3>
                                    <div class="mb-4">
                                        ${storeLogo ? `<img src="${storeLogo}" class="h-12 bg-gray-900 p-2 rounded mb-2">` : '<p class="text-sm text-gray-500 mb-2">Default text logo is active</p>'}
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <input type="file" id="logo-upload" accept="image/*" class="text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                                        <button onclick="uploadLogo()" class="bg-blue-500 text-white px-4 py-2 rounded text-sm hover:bg-blue-600 transition">Save Logo</button>
                                    </div>
                                    <p class="text-xs text-gray-400 mt-2">For best results, use a transparent PNG.</p>
                                </div>

                                <!-- Banners Setup -->
                                <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
                                    <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2"><i data-lucide="layers" class="w-5 h-5 text-purple-500"></i> Banners (Max 7)</h3>
                                    <div class="flex gap-2 mb-4 overflow-x-auto py-2">
                                        ${banners.map((b, i) => `
                                            <div class="relative flex-shrink-0 w-24 h-16 rounded overflow-hidden group border border-gray-200">
                                                <img src="${b}" class="w-full h-full object-cover">
                                                <div class="absolute inset-0 bg-black bg-opacity-50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                                                    <button onclick="deleteBanner(${i})" class="text-white hover:text-red-500"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                                                </div>
                                            </div>
                                        `).join('')}
                                        ${banners.length === 0 ? '<p class="text-sm text-gray-500">No banners added.</p>' : ''}
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <input type="file" id="banner-upload" accept="image/*" ${banners.length >= 7 ? 'disabled' : ''} class="text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-purple-50 file:text-purple-700 hover:file:bg-purple-100 cursor-pointer disabled:opacity-50">
                                        <button onclick="uploadBanner()" ${banners.length >= 7 ? 'disabled' : ''} class="bg-purple-500 text-white px-4 py-2 rounded text-sm hover:bg-purple-600 transition disabled:opacity-50">Add Banner</button>
                                    </div>
                                    <p class="text-xs text-gray-400 mt-2">Landscape images work best (e.g. 1920x500px). Auto-compressed over 1MB.</p>
                                </div>
                            </div>

                            <!-- Add Product Section -->
                            <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
                                <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2"><i data-lucide="plus-circle" class="w-5 h-5 text-green-500"></i> Add New Product</h3>
                                
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Product Title</label>
                                        <input type="text" id="p-title" class="w-full border rounded px-3 py-2 outline-none focus:border-orange-500">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                                        <select id="p-category" class="w-full border rounded px-3 py-2 outline-none focus:border-orange-500">
                                            ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Price (₹)</label>
                                        <input type="number" id="p-price" class="w-full border rounded px-3 py-2 outline-none focus:border-orange-500">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Old Price (₹) [Optional]</label>
                                        <input type="number" id="p-old-price" class="w-full border rounded px-3 py-2 outline-none focus:border-orange-500">
                                    </div>
                                    <div class="md:col-span-2">
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Item Purchase Link</label>
                                        <input type="url" id="p-link" placeholder="https://..." class="w-full border rounded px-3 py-2 outline-none focus:border-orange-500">
                                    </div>
                                    <div class="md:col-span-2">
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Product Image</label>
                                        <input type="file" id="p-image" accept="image/*" class="w-full border rounded p-1 outline-none text-sm text-gray-500 file:mr-4 file:py-1 file:px-3 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-gray-50 hover:file:bg-gray-100 cursor-pointer">
                                        <p class="text-xs text-gray-400 mt-1">Image will be automatically compressed to save space while maintaining quality.</p>
                                    </div>
                                </div>
                                <button id="add-product-btn" onclick="handleAddProduct()" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 rounded transition flex justify-center items-center gap-2">
                                    <i data-lucide="upload" class="w-4 h-4"></i> Save Product
                                </button>
                                <p id="add-p-msg" class="text-sm mt-2 text-center"></p>
                            </div>

                            <!-- Manage Products -->
                            <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
                                <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2"><i data-lucide="list" class="w-5 h-5 text-gray-600"></i> Manage Products (${products.length})</h3>
                                <div class="overflow-x-auto">
                                    <table class="w-full text-left border-collapse">
                                        <thead>
                                            <tr class="bg-gray-50 text-gray-600 text-sm">
                                                <th class="p-3 border-b">Image</th>
                                                <th class="p-3 border-b">Title</th>
                                                <th class="p-3 border-b">Category</th>
                                                <th class="p-3 border-b">Price</th>
                                                <th class="p-3 border-b">Action</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${products.map(p => `
                                                <tr class="border-b hover:bg-gray-50 transition">
                                                    <td class="p-3"><img src="${p.image}" class="w-10 h-10 object-cover rounded"></td>
                                                    <td class="p-3 text-sm max-w-xs truncate" title="${p.title}">${p.title}</td>
                                                    <td class="p-3 text-sm text-gray-500">${p.category}</td>
                                                    <td class="p-3 font-medium">₹${p.price}</td>
                                                    <td class="p-3">
                                                        <button onclick="deleteProduct('${p.id}')" class="text-red-500 hover:bg-red-50 p-2 rounded transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                                    </td>
                                                </tr>
                                            `).join('')}
                                            ${products.length === 0 ? '<tr><td colspan="5" class="text-center p-4 text-gray-500">No products added yet.</td></tr>' : ''}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            `;
        }

        function setupAdminEvents() {
            // Setup is done via inline onclick handlers for simplicity
        }

        /* ================= UTILS & FIREBASE ACTIONS ================= */
        
        // Image Compression function (crucial for <1MB Firebase doc limits)
        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800; // max width for products/banners
                    const MAX_HEIGHT = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width *= MAX_HEIGHT / height;
                            height = MAX_HEIGHT;
                        }
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Compress to JPEG, quality 0.7 (maintains good quality but small size)
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    callback(dataUrl);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // Save Settings to Firebase
        async function saveSettings(newLogo, newBanners) {
            if(!currentUser) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'main');
                await setDoc(docRef, {
                    logo: newLogo !== undefined ? newLogo : storeLogo,
                    banners: newBanners !== undefined ? newBanners : banners
                }, { merge: true });
            } catch (e) {
                console.error("Error saving settings:", e);
            }
        }

        window.uploadLogo = function() {
            const fileInput = document.getElementById('logo-upload');
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                compressImage(file, (base64) => {
                    saveSettings(base64, undefined);
                });
            }
        };

        window.uploadBanner = function() {
            const fileInput = document.getElementById('banner-upload');
            if (fileInput.files.length > 0 && banners.length < 7) {
                const file = fileInput.files[0];
                compressImage(file, (base64) => {
                    const newBanners = [...banners, base64];
                    saveSettings(undefined, newBanners);
                });
            }
        };

        window.deleteBanner = function(index) {
            const newBanners = [...banners];
            newBanners.splice(index, 1);
            saveSettings(undefined, newBanners);
        };

        window.handleAddProduct = function() {
            const title = document.getElementById('p-title').value.trim();
            const price = document.getElementById('p-price').value;
            const oldPrice = document.getElementById('p-old-price').value;
            const link = document.getElementById('p-link').value.trim();
            const category = document.getElementById('p-category').value;
            const fileInput = document.getElementById('p-image');
            const msgEl = document.getElementById('add-p-msg');
            const btn = document.getElementById('add-product-btn');

            if (!title || !price || !link || fileInput.files.length === 0) {
                msgEl.textContent = "Please fill all required fields and upload an image.";
                msgEl.className = "text-sm mt-2 text-center text-red-500";
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Saving...';

            compressImage(fileInput.files[0], async (base64Image) => {
                try {
                    let discount = 0;
                    if(oldPrice && Number(oldPrice) > Number(price)) {
                        discount = Math.round(((Number(oldPrice) - Number(price)) / Number(oldPrice)) * 100);
                    }

                    const productData = {
                        title, category, price: Number(price), oldPrice: oldPrice ? Number(oldPrice) : null,
                        link, image: base64Image, discount, createdAt: Date.now()
                    };

                    const productsRef = collection(db, 'artifacts', appId, 'public', 'data', 'products');
                    await addDoc(productsRef, productData);
                    
                    // Reset form
                    document.getElementById('p-title').value = '';
                    document.getElementById('p-price').value = '';
                    document.getElementById('p-old-price').value = '';
                    document.getElementById('p-link').value = '';
                    document.getElementById('p-image').value = '';
                    
                    msgEl.textContent = "Product added successfully!";
                    msgEl.className = "text-sm mt-2 text-center text-green-500";
                    setTimeout(() => msgEl.textContent = '', 3000);
                } catch (error) {
                    console.error("Error adding document: ", error);
                    msgEl.textContent = "Error adding product.";
                    msgEl.className = "text-sm mt-2 text-center text-red-500";
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = '<i data-lucide="upload" class="w-4 h-4"></i> Save Product';
                    lucide.createIcons();
                }
            });
        };

        window.deleteProduct = async function(id) {
            if(confirm("Are you sure you want to delete this product?")) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', id));
                } catch (error) {
                    console.error("Error deleting product:", error);
                }
            }
        };

        // Initialize
        initAuth();

    </script>
</body>
</html>
