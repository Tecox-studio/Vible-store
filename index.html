<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vible Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        
        .banner-slide {
            transition: opacity 0.5s ease-in-out;
            opacity: 0;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .banner-slide.active {
            opacity: 1;
            z-index: 1;
        }
        
        /* Custom premium animations */
        .animate-fade-in {
            animation: fadeIn 0.3s ease-in-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hide scrollbar for category list */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Modal Styles */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }

        /* Text truncation */
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-gray-50 pb-20 md:pb-0">

    <div id="app-container">
        <!-- Modern Skeleton Loader (Visible until data loads) -->
        <div class="w-full bg-gray-50 min-h-screen animate-pulse">
            <!-- Header Skeleton -->
            <header class="bg-[#0f1111] w-full">
                <div class="container mx-auto px-4 py-3 flex items-center gap-4">
                    <div class="h-8 w-8 bg-gray-700 rounded-full md:hidden"></div>
                    <div class="h-8 w-24 bg-gray-700 rounded"></div>
                    <div class="flex-grow h-10 bg-gray-700 rounded hidden md:block"></div>
                    <div class="w-16 h-8 bg-gray-700 rounded ml-auto"></div>
                </div>
            </header>
            
            <main class="pb-16">
                <!-- Hero Banner Skeleton -->
                <div class="container mx-auto px-4 mt-4">
                    <div class="w-full h-[220px] md:h-[400px] bg-gray-200 rounded-2xl mb-8"></div>
                </div>
                
                <!-- Category Circles Skeleton -->
                <div class="container mx-auto px-4 mb-8 flex gap-4 overflow-hidden">
                    <div class="w-[80px] h-[80px] bg-gray-200 rounded-full shrink-0"></div>
                    <div class="w-[80px] h-[80px] bg-gray-200 rounded-full shrink-0"></div>
                    <div class="w-[80px] h-[80px] bg-gray-200 rounded-full shrink-0"></div>
                    <div class="w-[80px] h-[80px] bg-gray-200 rounded-full shrink-0"></div>
                </div>

                <!-- Products Grid Skeleton -->
                <div class="container mx-auto px-4">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="bg-white rounded-lg p-4 shadow-sm border border-gray-100">
                            <div class="w-full pt-[100%] bg-gray-100 rounded mb-4"></div>
                            <div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
                            <div class="h-4 bg-gray-200 rounded w-1/2 mb-4"></div>
                        </div>
                        <div class="bg-white rounded-lg p-4 shadow-sm border border-gray-100">
                            <div class="w-full pt-[100%] bg-gray-100 rounded mb-4"></div>
                            <div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
                            <div class="h-4 bg-gray-200 rounded w-1/2 mb-4"></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Login Modal (Google, Email, Phone) -->
    <div id="login-modal" class="modal">
        <div class="bg-white rounded-2xl w-full max-w-md mx-4 shadow-2xl overflow-hidden flex flex-col max-h-[90vh] animate-fade-in">
            <div class="p-6 text-center border-b border-gray-100 bg-gray-50">
                <h2 class="text-2xl font-bold text-gray-800">Welcome to Vible Store</h2>
                <p class="text-gray-500 text-sm mt-1">Please log in to continue</p>
            </div>
            
            <!-- Auth Tabs -->
            <div class="flex border-b border-gray-200 bg-gray-50">
                <button onclick="switchTab('google')" id="tab-google" class="flex-1 py-3 text-sm font-semibold text-orange-500 border-b-2 border-orange-500 transition">Google</button>
                <button onclick="switchTab('email')" id="tab-email" class="flex-1 py-3 text-sm font-semibold text-gray-500 transition">Email</button>
                <button onclick="switchTab('phone')" id="tab-phone" class="flex-1 py-3 text-sm font-semibold text-gray-500 transition">Phone</button>
            </div>
            
            <div class="p-6 overflow-y-auto">
                <!-- Google Tab -->
                <div id="panel-google" class="block text-center space-y-4">
                    <button onclick="handleGoogleLogin()" class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 font-medium py-3 px-4 rounded-xl transition shadow-sm">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5" alt="Google"> Sign in with Google
                    </button>
                </div>
                
                <!-- Email Tab -->
                <div id="panel-email" class="hidden space-y-4">
                    <input type="email" id="email-input" placeholder="Email address" class="w-full border rounded-xl px-4 py-2 focus:outline-none focus:border-orange-500">
                    <input type="password" id="password-input" placeholder="Password" class="w-full border rounded-xl px-4 py-2 focus:outline-none focus:border-orange-500">
                    <div class="flex gap-2">
                        <button onclick="handleEmailLogin()" class="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-bold py-2.5 rounded-xl transition">Login</button>
                        <button onclick="handleEmailSignup()" class="flex-1 bg-gray-800 hover:bg-gray-900 text-white font-bold py-2.5 rounded-xl transition">Sign Up</button>
                    </div>
                </div>
                
                <!-- Phone Tab -->
                <div id="panel-phone" class="hidden space-y-4">
                    <div id="phone-step-1">
                        <input type="tel" id="phone-input" placeholder="Enter mobile with country code (e.g. +91...)" class="w-full border rounded-xl px-4 py-2 mb-3 focus:outline-none focus:border-orange-500">
                        <div id="recaptcha-container" class="mb-3 flex justify-center"></div>
                        <button onclick="sendOTP()" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-2.5 rounded-xl transition">Send OTP</button>
                    </div>
                    <div id="phone-step-2" class="hidden">
                        <input type="text" id="otp-input" placeholder="Enter 6-digit OTP" class="w-full border rounded-xl px-4 py-2 mb-4 focus:outline-none focus:border-orange-500">
                        <button onclick="verifyOTP()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-2.5 rounded-xl transition">Verify OTP</button>
                    </div>
                </div>
                
                <p id="auth-error" class="text-red-500 text-sm mt-4 text-center hidden"></p>
                <p id="auth-loading" class="text-blue-500 text-sm mt-4 text-center hidden"><i data-lucide="loader-2" class="animate-spin inline w-4 h-4 mr-1"></i> Processing...</p>
            </div>
        </div>
    </div>

    <!-- Admin Password Modal -->
    <div id="admin-auth-modal" class="modal">
        <div class="bg-white rounded-2xl p-8 w-full max-w-sm mx-4 shadow-2xl animate-fade-in">
            <h2 class="text-xl font-bold mb-4 text-center text-gray-800">Admin Login</h2>
            <input type="password" id="admin-password" placeholder="Enter Password" class="w-full border border-gray-300 rounded-xl px-4 py-2 mb-4 focus:outline-none focus:border-gray-800">
            <button onclick="verifyAdmin()" class="w-full bg-gray-900 hover:bg-black text-white font-bold py-2.5 px-4 rounded-xl transition">
                Login to Dashboard
            </button>
            <p id="admin-error" class="text-red-500 text-sm mt-2 text-center hidden">Incorrect password!</p>
        </div>
    </div>

    <!-- Custom Confirm Modal (Zero Browser Alerts) -->
    <div id="confirm-modal" class="modal">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm mx-4 shadow-2xl animate-fade-in text-center">
            <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 mb-4">
                <i data-lucide="trash-2" class="h-6 w-6 text-red-600"></i>
            </div>
            <h3 class="text-lg font-bold text-gray-900 mb-2">Delete Item</h3>
            <p class="text-sm text-gray-500 mb-6" id="confirm-modal-text">Are you sure you want to perform this action? This cannot be undone.</p>
            <div class="flex gap-3 justify-center">
                <button id="confirm-cancel-btn" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-800 text-sm font-medium rounded-xl transition">Cancel</button>
                <button id="confirm-ok-btn" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white text-sm font-medium rounded-xl transition">Delete</button>
            </div>
        </div>
    </div>

    <!-- Mobile Sidebar Menu -->
    <div id="mobile-sidebar" class="fixed inset-y-0 left-0 w-64 bg-[#0f1111] text-white z-50 transform -translate-x-full transition-transform duration-300 ease-in-out md:hidden">
        <div class="p-6 border-b border-gray-800 flex justify-between items-center">
            <span class="text-xl font-bold text-orange-500">Vible Store</span>
            <button onclick="toggleSidebar(false)" class="text-gray-400 hover:text-white"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <nav class="p-4 space-y-2">
            <button onclick="window.setCategory('All'); toggleSidebar(false);" class="w-full text-left py-2.5 px-4 rounded hover:bg-gray-800 transition">Home</button>
            <button onclick="window.setCategory('Electronics'); toggleSidebar(false);" class="w-full text-left py-2.5 px-4 rounded hover:bg-gray-800 transition">Electronics</button>
            <button onclick="window.setCategory('Fashion'); toggleSidebar(false);" class="w-full text-left py-2.5 px-4 rounded hover:bg-gray-800 transition">Fashion</button>
            <button onclick="window.setCategory('Home & Kitchen'); toggleSidebar(false);" class="w-full text-left py-2.5 px-4 rounded hover:bg-gray-800 transition">Home & Kitchen</button>
            <button onclick="window.setCategory('Beauty'); toggleSidebar(false);" class="w-full text-left py-2.5 px-4 rounded hover:bg-gray-800 transition">Beauty</button>
            <button onclick="window.setCategory('Sports'); toggleSidebar(false);" class="w-full text-left py-2.5 px-4 rounded hover:bg-gray-800 transition">Sports</button>
            <button onclick="window.setCategory('Books'); toggleSidebar(false);" class="w-full text-left py-2.5 px-4 rounded hover:bg-gray-800 transition">Books</button>
            <div class="border-t border-gray-800 my-4 pt-4"></div>
            <button onclick="logoutStoreUser()" class="w-full text-left py-2.5 px-4 rounded hover:bg-red-900/40 text-red-400 transition"><i data-lucide="log-out" class="w-4 h-4 inline mr-2"></i>Logout</button>
        </nav>
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithCustomToken, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword, signInWithEmailAndPassword, RecaptchaVerifier, signInWithPhoneNumber, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Web app's Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyArnkUgFSgOG0xVxwxQE9CX2S0-PUdpdOQ",
            authDomain: "vible-store.firebaseapp.com",
            projectId: "vible-store",
            storageBucket: "vible-store.firebasestorage.app",
            messagingSenderId: "566641793645",
            appId: "1:566641793645:web:3ca91fbc851aba5495bd64",
            measurementId: "G-CX3NNTNR6N"
        };
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'vible-store';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // State Management
        let currentUser = null;
        let products = [];
        let banners = []; // Stores banner documents: { id, image, createdAt }
        let storeLogo = '';
        let categoryImages = {}; // Stores category custom icons: { CategoryName: Base64Image }
        let activeCategory = 'All';
        let searchQuery = '';
        let bannerInterval = null;
        
        const categories = ["Electronics", "Fashion", "Home & Kitchen", "Beauty", "Sports", "Books", "Automotive", "Toys & Games"];

        // Initialize App Auth
        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    onAuthStateChanged(auth, (user) => {
                        if (user) {
                            currentUser = user;
                            document.getElementById('login-modal').classList.remove('active');
                            checkUserLoginStatus();
                            setupDatabaseListeners();
                        } else {
                            currentUser = null;
                            const hash = window.location.hash;
                            if (hash === '#vible-admin') {
                                document.getElementById('admin-auth-modal').classList.add('active');
                            } else {
                                document.getElementById('login-modal').classList.add('active');
                            }
                        }
                    });
                }
            } catch (error) {
                console.error("Auth error:", error);
                window.showToast("Firebase Config error! Check Console.", "error");
            }
        }

        // Database Listeners
        function setupDatabaseListeners() {
            if (!currentUser) return;

            // Load Products
            const productsRef = collection(db, 'artifacts', appId, 'public', 'data', 'products');
            onSnapshot(productsRef, (snapshot) => {
                products = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderApp();
            }, (error) => { console.error("Error fetching products:", error); });

            // Load Banners (Individually stored documents to bypass size limits)
            const bannersRef = collection(db, 'artifacts', appId, 'public', 'data', 'banners');
            onSnapshot(bannersRef, (snapshot) => {
                banners = snapshot.docs
                    .map(doc => ({ id: doc.id, ...doc.data() }))
                    .sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
                renderApp();
            }, (error) => { console.error("Error fetching banners:", error); });

            // Load Custom Category Icons
            const categoriesRef = collection(db, 'artifacts', appId, 'public', 'data', 'categories');
            onSnapshot(categoriesRef, (snapshot) => {
                categoryImages = {};
                snapshot.docs.forEach(doc => {
                    categoryImages[doc.id] = doc.data().image;
                });
                renderApp();
            }, (error) => { console.error("Error fetching category icons:", error); });

            // Load Settings (Logo Only)
            const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'main');
            onSnapshot(settingsRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    storeLogo = data.logo || '';
                }
                renderApp();
            }, (error) => { console.error("Error fetching settings:", error); });
        }

        // Check Local User Profile
        function checkUserLoginStatus() {
            const hash = window.location.hash;
            if (hash === '#vible-admin') {
                document.getElementById('admin-auth-modal').classList.add('active');
            } else if (!currentUser) {
                document.getElementById('login-modal').classList.add('active');
            } else {
                renderApp();
            }
        }

        // Custom Premium Toast Notification System (Zero alerts)
        window.showToast = function(message, type = 'success') {
            const container = document.getElementById('toast-container') || (() => {
                const c = document.createElement('div');
                c.id = 'toast-container';
                c.className = 'fixed bottom-20 md:bottom-4 right-4 z-50 flex flex-col gap-2';
                document.body.appendChild(c);
                return c;
            })();

            const toast = document.createElement('div');
            toast.className = `flex items-center gap-2 px-4 py-3 rounded-xl shadow-lg text-white font-medium transition duration-300 transform translate-y-10 opacity-0 ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
            toast.innerHTML = `<i data-lucide="${type === 'success' ? 'check-circle' : 'alert-circle'}" class="w-5 h-5 shrink-0"></i><span class="text-sm">${message}</span>`;
            container.appendChild(toast);
            lucide.createIcons();
            
            setTimeout(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            }, 100);

            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        };

        // Custom Confirm Dialog Trigger
        window.showConfirm = function(text, onOk) {
            const modal = document.getElementById('confirm-modal');
            const okBtn = document.getElementById('confirm-ok-btn');
            const cancelBtn = document.getElementById('confirm-cancel-btn');
            document.getElementById('confirm-modal-text').textContent = text;
            modal.classList.add('active');
            
            const cleanUp = () => {
                modal.classList.remove('active');
                okBtn.replaceWith(okBtn.cloneNode(true));
                cancelBtn.replaceWith(cancelBtn.cloneNode(true));
            };

            document.getElementById('confirm-ok-btn').addEventListener('click', () => {
                onOk();
                cleanUp();
            });
            document.getElementById('confirm-cancel-btn').addEventListener('click', cleanUp);
        };

        // Global functions for UI bindings & Auth
        window.switchTab = function(tabName) {
            ['google', 'email', 'phone'].forEach(t => {
                document.getElementById(`tab-${t}`).className = `flex-1 py-3 text-sm font-semibold transition ${t === tabName ? 'text-orange-500 border-b-2 border-orange-500' : 'text-gray-500'}`;
                document.getElementById(`panel-${t}`).className = t === tabName ? 'block space-y-4' : 'hidden space-y-4';
            });
            document.getElementById('auth-error').classList.add('hidden');
            
            if(tabName === 'phone' && !window.recaptchaVerifier) {
                window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'normal' });
                window.recaptchaVerifier.render();
            }
        };

        function showAuthError(msg) {
            const errEl = document.getElementById('auth-error');
            errEl.textContent = msg;
            errEl.classList.remove('hidden');
            document.getElementById('auth-loading').classList.add('hidden');
        }

        function showAuthLoading() {
            document.getElementById('auth-error').classList.add('hidden');
            document.getElementById('auth-loading').classList.remove('hidden');
        }

        window.handleGoogleLogin = async function() {
            showAuthLoading();
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
                window.showToast("Logged in with Google successfully!");
            } catch(e) {
                showAuthError("Google Sign-in failed: " + e.message);
            }
        };

        window.handleEmailLogin = async function() {
            const email = document.getElementById('email-input').value;
            const pass = document.getElementById('password-input').value;
            if(!email || !pass) return showAuthError("Enter email and password");
            showAuthLoading();
            try { 
                await signInWithEmailAndPassword(auth, email, pass); 
                window.showToast("Logged in successfully!");
            } 
            catch(e) { showAuthError(e.message); }
        };

        window.handleEmailSignup = async function() {
            const email = document.getElementById('email-input').value;
            const pass = document.getElementById('password-input').value;
            if(!email || !pass) return showAuthError("Enter email and password");
            showAuthLoading();
            try { 
                await createUserWithEmailAndPassword(auth, email, pass); 
                window.showToast("Account created & logged in successfully!");
            } 
            catch(e) { showAuthError(e.message); }
        };

        window.sendOTP = async function() {
            const phone = document.getElementById('phone-input').value;
            if(!phone.startsWith('+')) return showAuthError("Start with country code, e.g. +91");
            showAuthLoading();
            try {
                window.confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
                document.getElementById('phone-step-1').classList.add('hidden');
                document.getElementById('phone-step-2').classList.remove('hidden');
                document.getElementById('auth-loading').classList.add('hidden');
                window.showToast("OTP code sent to your phone!");
            } catch(e) { showAuthError(e.message); }
        };

        window.verifyOTP = async function() {
            const code = document.getElementById('otp-input').value;
            if(!code) return showAuthError("Enter OTP");
            showAuthLoading();
            try { 
                await window.confirmationResult.confirm(code); 
                window.showToast("Phone verified successfully!");
            } 
            catch(e) { showAuthError("Invalid OTP: " + e.message); }
        };

        window.logoutStoreUser = async function() {
            try {
                await signOut(auth);
                renderApp();
                window.showToast("Logged out successfully.");
            } catch(e) { console.error("Logout error", e); }
        };
        
        window.toggleAccountMenu = function() {
            const menu = document.getElementById('account-dropdown');
            if(menu) menu.classList.toggle('hidden');
        };

        window.toggleSidebar = function(show) {
            const sidebar = document.getElementById('mobile-sidebar');
            if (show) {
                sidebar.classList.remove('-translate-x-full');
            } else {
                sidebar.classList.add('-translate-x-full');
            }
        };

        window.verifyAdmin = function() {
            const pass = document.getElementById('admin-password').value;
            if (pass === '2010') {
                sessionStorage.setItem('isAdminAuth', 'true');
                document.getElementById('admin-auth-modal').classList.remove('active');
                renderApp();
                window.showToast("Welcome Admin! Logged in successfully.");
            } else {
                document.getElementById('admin-error').classList.remove('hidden');
            }
        };

        window.logoutAdmin = function() {
            sessionStorage.removeItem('isAdminAuth');
            window.location.hash = '';
            renderApp();
            window.showToast("Logged out from Admin Panel.");
        };

        // Routing & Rendering
        function renderApp() {
            const hash = window.location.hash;
            const container = document.getElementById('app-container');
            
            if (hash === '#vible-admin') {
                if (sessionStorage.getItem('isAdminAuth') === 'true') {
                    container.innerHTML = getAdminHTML();
                    setupAdminEvents();
                } else {
                    document.getElementById('admin-auth-modal').classList.add('active');
                }
            } else {
                container.innerHTML = getStoreHTML();
                setupStoreEvents();
            }
            
            lucide.createIcons();
        }
        
        window.addEventListener('hashchange', () => {
            document.getElementById('admin-auth-modal').classList.remove('active');
            checkUserLoginStatus();
            renderApp();
        });

        /* ================= STORE VIEW ================= */
        function getStoreHTML() {
            let userName = 'User';
            if (currentUser) {
                userName = currentUser.displayName || currentUser.email?.split('@')[0] || currentUser.phoneNumber || 'User';
            }
            
            // Filter products
            let displayProducts = products;
            if (activeCategory !== 'All') {
                displayProducts = displayProducts.filter(p => p.category === activeCategory);
            }
            if (searchQuery) {
                displayProducts = displayProducts.filter(p => p.title.toLowerCase().includes(searchQuery.toLowerCase()));
            }

            const defaultLogo = `<div class="flex items-center text-2xl font-bold text-white"><span class="text-orange-500">V</span>S <span class="ml-1 font-semibold">VIBLE <span class="text-orange-500 text-sm align-top">STORE</span></span></div>`;
            const logoHTML = storeLogo ? `<img src="${storeLogo}" alt="Logo" class="h-10">` : defaultLogo;

            // Photography Category Fallbacks exactly matching ChatGPT Image Jul 13, 2026, 12_53_45 PM.png
            const categoryImagesFallback = {
                "Electronics": "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=200&q=80",
                "Fashion": "https://images.unsplash.com/photo-1479064555552-3ef4979f8908?w=200&q=80",
                "Home & Kitchen": "https://images.unsplash.com/photo-1556911220-e15b29be8c8f?w=200&q=80",

                    ` : `
                        <div class="container mx-auto px-4 pt-6 pb-2">

                    <!-- Products Grid -->
                    <div class="container mx-auto px-4 mt-6 pb-12">

                                                    ${product.oldPrice ? `<span class="text-xs md:text-sm text-gray-400 line-through">₹${product.oldPrice}</span>` : ''}
                                                </div>
                                                <a href="${product.link}" target="_blank" rel="noopener noreferrer" class="block w-full text-center bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-bold py-2 rounded-xl transition shadow-sm text-xs md:text-sm">
                                                    View Item
                                                </a>
                                            </div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        `}
                    </div>
                </main>
                
                <!-- Bottom Sticky Navigation Bar for Mobile (Matching ChatGPT Image Jul 13, 2026, 12_53_45 PM.png) -->
                <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 py-2 flex justify-around items-center md:hidden z-40 shadow-xl">
                    <button onclick="window.setCategory('All')" class="flex flex-col items-center justify-center text-gray-500 focus:outline-none hover:text-orange-500 ${activeCategory === 'All' ? 'text-orange-500 font-bold' : ''}">
                        <i data-lucide="home" class="w-5 h-5"></i>
                        <span class="text-[10px] mt-0.5">Home</span>
                    </button>
                    <button onclick="window.scrollTo({top: document.body.scrollHeight/3, behavior: 'smooth'})" class="flex flex-col items-center justify-center text-gray-500 focus:outline-none hover:text-orange-500">

                    </button>

                            </div>

                            <div>
                                <h4 class="font-bold">24/7 Support</h4>
                                <p class="text-sm text-gray-400">Need help? We're here for you anytime.</p>
                            </div>
                        </div>
                    </div>
                </footer>
            `;
        }

        function setupStoreEvents() {
            if (bannerInterval) clearInterval(bannerInterval);
            
            const slides = document.querySelectorAll('.banner-slide');
            if (slides.length > 1) {
                let currentSlide = 0;
                bannerInterval = setInterval(() => {
                    if(slides[currentSlide]) slides[currentSlide].classList.remove('active');
                    currentSlide = (currentSlide + 1) % slides.length;
                    if(slides[currentSlide]) slides[currentSlide].classList.add('active');
                }, 3000);
            }

            const searchInputDesktop = document.getElementById('store-search-desktop');
            if (searchInputDesktop) {
                searchInputDesktop.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') handleSearch('desktop');
                });
            }

            const searchInputMobile = document.getElementById('store-search-mobile');
            if (searchInputMobile) {
                searchInputMobile.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') handleSearch('mobile');
                });
            }
        }

        window.setCategory = function(category) {
            activeCategory = category;
            searchQuery = '';
            renderApp();
            window.scrollTo(0,0);
        };

        window.handleSearch = function(device) {
            const input = document.getElementById(device === 'mobile' ? 'store-search-mobile' : 'store-search-desktop');
            searchQuery = input.value.trim();
            renderApp();
        };

        /* ================= ADMIN VIEW ================= */
        function getAdminHTML() {

                        <div class="p-6 max-w-6xl mx-auto space-y-6">

                                    <div class="mb-4">

                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">

                                <p id="add-p-msg" class="text-sm mt-2 text-center"></p>
                            </div>

                            <!-- Manage Products -->
                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                                <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2"><i data-lucide="list" class="w-5 h-5 text-gray-600"></i> Manage Products (${products.length})</h3>
                                <div class="overflow-x-auto">
                                    <table class="w-full text-left border-collapse">
                                        <thead>
                                            <tr class="bg-gray-50 text-gray-600 text-sm">

                                                <th class="p-3 border-b">Title</th>

                                                    <td class="p-3"><img src="${p.image}" class="w-10 h-10 object-cover rounded"></td>
                                                    <td class="p-3 text-sm max-w-xs truncate" title="${p.title}">${p.title}</td>
                                                    <td class="p-3 text-sm text-gray-500">${p.category}</td>

                                                    </td>

                                            ${products.length === 0 ? '<tr><td colspan="5" class="text-center p-4 text-gray-500">No products added yet.</td></tr>' : ''}

                            </div>

                    </div>
                </div>
            `;
        }

        /* ================= UTILS & FIREBASE ACTIONS ================= */
        // Premium Base64 Image Compression (Supports PNG Transparency)
        function compressImage(file, maxDimension, quality, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > maxDimension) {
                            height *= maxDimension / width;
                            width = maxDimension;
                        }
                    } else {
                        if (height > maxDimension) {
                            width *= maxDimension / height;
                            height = maxDimension;
                        }
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Maintain transparency for PNG files, otherwise use JPEG compression
                    const mimeType = file.type === 'image/png' ? 'image/png' : 'image/jpeg';
                    const dataUrl = canvas.toDataURL(mimeType, mimeType === 'image/png' ? undefined : quality);
                    callback(dataUrl);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // Save Logo Settings to Firebase
        async function saveSettings(newLogo) {
            if(!currentUser) return false;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'main');
                await setDoc(docRef, {
                    logo: newLogo !== undefined ? newLogo : storeLogo
                }, { merge: true });
                return true;
            } catch (e) {
                console.error("Error saving settings:", e);
                return false;
            }
        }

        window.uploadLogo = function() {
            const fileInput = document.getElementById('logo-upload');
            const btn = document.getElementById('logo-save-btn');
            const msg = document.getElementById('logo-msg');

            if (fileInput.files.length > 0) {
                btn.disabled = true;
                btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Saving...';
                lucide.createIcons();

                const file = fileInput.files[0];
                // Max 400px with 0.9 quality for beautiful transparent Logo
                compressImage(file, 400, 0.9, async (base64) => {
                    const success = await saveSettings(base64);
                    btn.disabled = false;
                    btn.innerHTML = 'Save Logo';
                    
                    if(success) {
                        window.showToast("Logo Saved Successfully!", "success");
                    } else {
                        window.showToast("Error saving logo.", "error");
                    }
                });
            }
        };

        window.uploadBanner = function() {
            const fileInput = document.getElementById('banner-upload');
            const btn = document.getElementById('banner-save-btn');
            const msg = document.getElementById('banner-msg');

            if (fileInput.files.length > 0 && banners.length < 5) {
                btn.disabled = true;
                btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Saving...';
                lucide.createIcons();

                const file = fileInput.files[0];
                // Premium 1400px High-Res Banner Compression (No blurriness!)
                compressImage(file, 1400, 0.85, async (base64) => {
                    try {
                        const bannersRef = collection(db, 'artifacts', appId, 'public', 'data', 'banners');
                        await addDoc(bannersRef, { image: base64, createdAt: Date.now() });
                        
                        btn.disabled = false;
                        btn.innerHTML = 'Add Banner';
                        fileInput.value = '';
                        window.showToast("Banner Added Successfully!", "success");
                    } catch (error) {
                        btn.disabled = false;
                        btn.innerHTML = 'Add Banner';
                        window.showToast("Error saving banner: " + error.message, "error");
                    }
                });
            }
        };

        window.deleteBanner = function(id) {
            window.showConfirm("Are you sure you want to delete this banner?", async () => {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'banners', id));
                    window.showToast("Banner deleted successfully.", "success");
                } catch (error) {

                    window.showToast("Error deleting banner.", "error");

        window.uploadCategoryIcon = function() {
            const catSelect = document.getElementById('cat-select').value;
            const fileInput = document.getElementById('cat-image-upload');
            const btn = document.getElementById('cat-save-btn');
            const msg = document.getElementById('cat-msg');

            if (fileInput.files.length > 0) {
                btn.disabled = true;
                btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>...';
                lucide.createIcons();

                const file = fileInput.files[0];
                // Crisp 300px icon compression
                compressImage(file, 300, 0.85, async (base64) => {
                    try {
                        const catDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'categories', catSelect);
                        await setDoc(catDocRef, { image: base64 });
                        window.showToast(`${catSelect} Icon Uploaded!`, "success");
                    } catch (error) {
                        window.showToast("Error uploading icon.", "error");
                    } finally {
                        btn.disabled = false;
                        btn.innerHTML = 'Upload';
                        fileInput.value = '';
                    }

            }
        };

        window.removeCategoryIcon = function(category) {
            window.showConfirm(`Are you sure you want to remove the custom icon for ${category}?`, async () => {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'categories', category));
                    window.showToast(`${category} custom icon removed.`, "success");
                } catch (error) {
                    console.error("Error removing category icon:", error);
                }
            });
        };

        window.handleAddProduct = function() {
            const title = document.getElementById('p-title').value.trim();
            const price = document.getElementById('p-price').value;
            const oldPrice = document.getElementById('p-old-price').value;
            const link = document.getElementById('p-link').value.trim();
            const category = document.getElementById('p-category').value;
            const fileInput = document.getElementById('p-image');
            const msgEl = document.getElementById('add-p-msg');
            const btn = document.getElementById('add-product-btn');

            if (!title || !price || !link || fileInput.files.length === 0) {
                window.showToast("Please fill all required fields and upload an image.", "error");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Saving...';
            lucide.createIcons();

            // High-Res 800px product image compression
            compressImage(fileInput.files[0], 800, 0.85, async (base64Image) => {
                try {
                    let discount = 0;
                    if(oldPrice && Number(oldPrice) > Number(price)) {
                        discount = Math.round(((Number(oldPrice) - Number(price)) / Number(oldPrice)) * 100);
                    }

                    const productData = {
                        title, category, price: Number(price), oldPrice: oldPrice ? Number(oldPrice) : null,
                        link, image: base64Image, discount, createdAt: Date.now()
                    };

                    const productsRef = collection(db, 'artifacts', appId, 'public', 'data', 'products');
                    await addDoc(productsRef, productData);
                    
                    document.getElementById('p-title').value = '';
                    document.getElementById('p-price').value = '';
                    document.getElementById('p-old-price').value = '';
                    document.getElementById('p-link').value = '';
                    document.getElementById('p-image').value = '';
                    
                    window.showToast("Product saved successfully!", "success");
                } catch (error) {
                    window.showToast("Error adding product: " + error.message, "error");
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = '<i data-lucide="upload" class="w-4 h-4"></i> Save Product';
                    lucide.createIcons();
                }
            });
        };

        window.deleteProduct = function(id) {
            window.showConfirm("Are you sure you want to delete this product?", async () => {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', id));
                    window.showToast("Product deleted successfully.", "success");
                } catch (error) {
                    console.error("Error deleting product:", error);
                    window.showToast("Error deleting product.", "error");
                }
            });
        };

        initAuth();

    </script>
